    // =====================================================================
    // SQL pane
    // =====================================================================
    const SqlPane = {
      focus() {
        const ed = $('#sqlEditor');
        if (ed && !ed.value) {
          ed.value = Storage.get('sqlDraft', '') || '';
        }
        setTimeout(() => ed.focus(), 30);
      },

      bind() {
        const ed = $('#sqlEditor');
        ed.addEventListener('input', () => {
          State.sql.text = ed.value;
          Storage.set('sqlDraft', ed.value);
        });
        ed.addEventListener('keydown', (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
            e.preventDefault();
            SqlPane.run();
          }
          if ((e.metaKey || e.ctrlKey) && (e.key === 's' || e.key === 'S')) {
            e.preventDefault();
            SqlPane.openSave();
          }
          if (e.key === 'Tab') {
            e.preventDefault();
            const start = ed.selectionStart;
            const end = ed.selectionEnd;
            ed.value = ed.value.slice(0, start) + '  ' + ed.value.slice(end);
            ed.selectionStart = ed.selectionEnd = start + 2;
          }
        });
        $('#sqlRun').addEventListener('click', () => SqlPane.run());
        $('#sqlFormat').addEventListener('click', () => {
          ed.value = SqlPane.format(ed.value);
          State.sql.text = ed.value;
          Storage.set('sqlDraft', ed.value);
        });
        $('#sqlSave').addEventListener('click', () => SqlPane.openSave());
      },

      async run() {
        const text = $('#sqlEditor').value.trim();
        if (!text) return;
        State.sql.running = true;
        State.sql.error = null;
        SqlPane.renderResults();
        try {
          const res = await Api.runSql(text);
          State.sql.result = res;
          State.sql.error = null;
        } catch (err) {
          State.sql.error = err.message;
          State.sql.result = null;
        } finally {
          State.sql.running = false;
          SqlPane.renderResults();
        }
      },

      renderResults() {
        const meta = $('#sqlMeta');
        const host = $('#sqlResults');
        if (State.sql.running) {
          meta.style.display = 'none';
          host.innerHTML = '';
          const skel = el('div');
          for (let i = 0; i < 8; i++) {
            const row = el('div', { class: 'skeleton-row' });
            for (let c = 0; c < 4; c++) row.appendChild(el('div', { class: 'skeleton-cell' }));
            skel.appendChild(row);
          }
          host.appendChild(skel);
          return;
        }
        if (State.sql.error) {
          meta.style.display = 'none';
          host.innerHTML = '';
          host.appendChild(
            el('div', { class: 'error-box' }, [
              el('div', { class: 'error-box-title', text: 'Query error' }),
              document.createTextNode(State.sql.error),
            ])
          );
          return;
        }
        const r = State.sql.result;
        if (!r) {
          meta.style.display = 'none';
          host.innerHTML = '<div class="empty">Run a query to see results.</div>';
          return;
        }
        meta.style.display = '';
        meta.innerHTML = '';
        meta.appendChild(el('span', { class: 'ok', text: '●' }));
        meta.appendChild(document.createTextNode(' ' + formatNumber(r.rowCount) + ' rows'));
        meta.appendChild(el('span', { class: 'sep', text: '·' }));
        meta.appendChild(document.createTextNode(r.elapsedMs + ' ms'));
        meta.appendChild(el('span', { class: 'sep', text: '·' }));
        meta.appendChild(document.createTextNode((r.columns || []).length + ' columns'));

        host.innerHTML = '';
        if (!r.rows || !r.rows.length) {
          host.appendChild(el('div', { class: 'empty', text: 'Query returned no rows.' }));
          return;
        }
        const cols = (r.columns || []).map((c) => c.name || c);
        host.appendChild(Table.render(cols, r.rows));
      },

      format(sql) {
        // Minimal client-side formatter: uppercase keywords + newlines before clauses
        const kws = [
          'SELECT',
          'FROM',
          'WHERE',
          'ORDER BY',
          'GROUP BY',
          'HAVING',
          'LIMIT',
          'OFFSET',
          'JOIN',
          'LEFT JOIN',
          'RIGHT JOIN',
          'INNER JOIN',
          'OUTER JOIN',
          'ON',
          'AND',
          'OR',
          'WITH',
          'UNION',
          'UNION ALL',
          'INTERSECT',
          'EXCEPT',
          'AS',
        ];
        let out = sql.replace(/\s+/g, ' ').trim();
        const patterns = kws
          .slice()
          .sort((a, b) => b.length - a.length)
          .map((k) => ({
            k,
            re: new RegExp('\\b' + k.replace(/ /g, '\\s+') + '\\b', 'gi'),
          }));
        for (const { k, re } of patterns) {
          out = out.replace(re, k);
        }
        const breakBefore = ['FROM', 'WHERE', 'ORDER BY', 'GROUP BY', 'HAVING', 'LIMIT', 'OFFSET'];
        for (const k of breakBefore) {
          out = out.replace(new RegExp('\\s*' + k + '\\s*', 'g'), '\n' + k + ' ');
        }
        out = out.replace(/\s*,\s*/g, ', ');
        return out.trim();
      },

      openSave() {
        const text = $('#sqlEditor').value.trim();
        if (!text) return;
        State.savePrompt = { kind: 'sql', sql: text, args: null };
        Modal.open('savePromptBackdrop');
        $('#savePromptName').value = '';
        SavePrompt.fillTables();
      },
    };

    // =====================================================================
    // Builder pane
    // =====================================================================
    const BuilderPane = {
      resetForTable(tableName) {
        State.builder.table = tableName;
        State.builder.args = emptyBuilderArgs();
        State.builder.result = null;
        State.builder.error = null;
        State.builder.validation = {};
        BuilderPane.render();
      },

      findTable(name) {
        return State.tablesByName.get(name);
      },

      render() {
        const host = $('#builderLeft');
        host.innerHTML = '';
        if (!State.tables.length) {
          host.appendChild(el('div', { class: 'empty', text: 'Loading schema…' }));
          BuilderPane.updatePreview();
          return;
        }
        if (!State.builder.table) {
          State.builder.table =
            (State.currentTable && State.currentTable.name) ||
            (State.tables[0] && State.tables[0].name);
        }
        $('#builderSub').textContent = 'Visual findMany composer';

        // Table picker
        const tablePick = el('div', { class: 'builder-section' }, [
          el('div', { class: 'builder-section-title' }, [el('h3', { text: 'Table' })]),
          (() => {
            const sel = el('select', { class: 'builder-select', id: 'builderTable' });
            for (const t of State.tables) {
              sel.appendChild(el('option', { value: t.name, text: t.name }));
            }
            sel.value = State.builder.table;
            sel.addEventListener('change', () => {
              BuilderPane.resetForTable(sel.value);
            });
            return sel;
          })(),
        ]);
        host.appendChild(tablePick);

        const tableMeta = BuilderPane.findTable(State.builder.table);
        if (!tableMeta) {
          host.appendChild(el('div', { class: 'error-box', text: 'Unknown table.' }));
          return;
        }

        // WHERE
        host.appendChild(BuilderPane.renderWhere(State.builder.args, tableMeta, []));
        // WITH
        host.appendChild(BuilderPane.renderWith(State.builder.args, tableMeta, []));
        // ORDER BY / LIMIT
        host.appendChild(BuilderPane.renderOrderLimit(State.builder.args, tableMeta));
        // SELECT / OMIT
        host.appendChild(BuilderPane.renderSelectOmit(State.builder.args, tableMeta));

        BuilderPane.updatePreview();
        BuilderPane.updateRunButton();
      },

      renderWhere(args, tableMeta, path) {
        const section = el('div', { class: 'builder-section' });
        const header = el('div', { class: 'builder-section-title' }, [
          el('h3', { text: 'where' }),
          (() => {
            const pick = el('div', { class: 'combinator-pick' });
            for (const c of ['AND', 'OR', 'NOT']) {
              pick.appendChild(
                el('button', {
                  class: args.combinator === c ? 'active' : '',
                  text: c,
                  onclick: () => {
                    args.combinator = c;
                    BuilderPane.render();
                  },
                })
              );
            }
            return pick;
          })(),
        ]);
        section.appendChild(header);

        const wrap = el('div', { class: 'where-clauses' });
        args.where.forEach((clause, idx) => {
          wrap.appendChild(BuilderPane.renderClause(args, clause, idx, tableMeta));
        });
        section.appendChild(wrap);

        const addRow = el('div', { class: 'clause-row', style: { marginTop: '8px' } }, [
          el('button', {
            class: 'btn btn-sm',
            text: '+ Clause',
            onclick: () => {
              args.where.push({
                column: (tableMeta.columns[0] || {}).name || '',
                op: 'equals',
                value: '',
                insensitive: false,
              });
              BuilderPane.render();
            },
          }),
        ]);
        section.appendChild(addRow);

        return section;
      },

      renderClause(args, clause, idx, tableMeta) {
        const row = el('div', { class: 'where-clause' });
        // column select
        const colSel = el('select', { class: 'builder-select' });
        for (const c of tableMeta.columns) {
          const opt = el('option', { value: c.name, text: c.name });
          if (c.name === clause.column) opt.selected = true;
          colSel.appendChild(opt);
        }
        colSel.addEventListener('change', () => {
          clause.column = colSel.value;
          const col = tableMeta.columns.find((c) => c.name === clause.column);
          const ops = col ? operatorsForType(col.tsType) : ['equals'];
          if (!ops.includes(clause.op)) clause.op = ops[0];
          BuilderPane.render();
        });
        row.appendChild(colSel);

        // op select
        const col = tableMeta.columns.find((c) => c.name === clause.column);
        const ops = col ? operatorsForType(col.tsType) : ['equals'];
        const opSel = el('select', { class: 'builder-select' });
        for (const op of ops) {
          const opt = el('option', { value: op, text: op });
          if (op === clause.op) opt.selected = true;
          opSel.appendChild(opt);
        }
        opSel.addEventListener('change', () => {
          clause.op = opSel.value;
          BuilderPane.render();
        });
        row.appendChild(opSel);

        // value input
        const valInput = el('input', {
          class: 'builder-input',
          type: col && isNumericType(col.tsType) ? 'number' : 'text',
          placeholder: 'value',
          value: clause.value != null ? String(clause.value) : '',
        });
        valInput.addEventListener('input', () => {
          clause.value = valInput.value;
          BuilderPane.updatePreview();
          BuilderPane.updateRunButton();
        });
        row.appendChild(valInput);

        // remove
        const rm = el('button', {
          class: 'btn-ghost icon-btn',
          'aria-label': 'Remove clause',
          text: '×',
          onclick: () => {
            args.where.splice(idx, 1);
            BuilderPane.render();
          },
        });
        row.appendChild(rm);

        // insensitive toggle for string cols
        if (col && isStringType(col.tsType) && ['contains', 'startsWith', 'endsWith', 'equals'].includes(clause.op)) {
          const ci = el('div', { class: 'clause-row', style: { gridColumn: '1 / -1' } }, [
            el(
              'button',
              {
                class: 'chip' + (clause.insensitive ? ' active' : ''),
                text: 'mode: insensitive',
                onclick: () => {
                  clause.insensitive = !clause.insensitive;
                  BuilderPane.render();
                },
              },
              []
            ),
          ]);
          const both = el('div', { class: 'builder-field' });
          both.appendChild(row);
          both.appendChild(ci);
          return both;
        }
        return row;
      },

      renderWith(args, tableMeta, path) {
        const section = el('div', { class: 'builder-section' });
        section.appendChild(
          el('div', { class: 'builder-section-title' }, [el('h3', { text: 'with (relations)' })])
        );
        const rels = tableMeta.relations || [];
        if (!rels.length) {
          section.appendChild(
            el('div', { class: 'field-hint', style: { color: 'var(--text-muted)' }, text: 'No relations.' })
          );
          return section;
        }
        const wrap = el('div', { class: 'with-rels' });
        for (const rel of rels) {
          const existing = args.with.find((w) => w.relation === rel.name);
          const active = !!existing;
          const relBox = el('div', { class: 'with-rel' + (existing && existing.expanded ? ' expanded' : '') });
          const head = el('div', { class: 'with-rel-header' }, [
            el('div', {}, [
              el('span', { class: 'chev', text: '›' }),
              el('span', { class: 'with-rel-name', text: ' ' + rel.name }),
              el('span', { class: 'with-rel-meta', text: ' · ' + rel.type + ' → ' + rel.to }),
            ]),
            el(
              'button',
              {
                class: 'chip' + (active ? ' active' : ''),
                text: active ? 'included' : 'include',
                onclick: (e) => {
                  e.stopPropagation();
                  if (active) {
                    args.with = args.with.filter((w) => w.relation !== rel.name);
                  } else {
                    args.with.push({
                      relation: rel.name,
                      expanded: true,
                      args: emptyBuilderArgs(),
                    });
                  }
                  BuilderPane.render();
                },
              },
              []
            ),
          ]);
          head.addEventListener('click', () => {
            if (existing) {
              existing.expanded = !existing.expanded;
              BuilderPane.render();
            }
          });
          relBox.appendChild(head);

          if (existing && existing.expanded) {
            const targetMeta = BuilderPane.findTable(rel.to);
            const body = el('div', { class: 'with-rel-body' });
            if (!targetMeta) {
              body.appendChild(el('div', { class: 'field-hint', text: 'Unknown target table ' + rel.to }));
            } else {
              body.appendChild(BuilderPane.renderWhere(existing.args, targetMeta, path.concat(rel.name)));
              body.appendChild(BuilderPane.renderOrderLimit(existing.args, targetMeta));
              body.appendChild(BuilderPane.renderWith(existing.args, targetMeta, path.concat(rel.name)));
            }
            relBox.appendChild(body);
          }
          wrap.appendChild(relBox);
        }
        section.appendChild(wrap);
        return section;
      },

      renderOrderLimit(args, tableMeta) {
        const section = el('div', { class: 'builder-section' });
        section.appendChild(
          el('div', { class: 'builder-section-title' }, [el('h3', { text: 'orderBy / limit' })])
        );

        const row = el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 120px 100px', gap: '8px' } });

        const colSel = el('select', { class: 'builder-select' });
        colSel.appendChild(el('option', { value: '', text: '— none —' }));
        for (const c of tableMeta.columns) {
          const opt = el('option', { value: c.name, text: c.name });
          if (args.orderBy && args.orderBy.column === c.name) opt.selected = true;
          colSel.appendChild(opt);
        }
        colSel.addEventListener('change', () => {
          args.orderBy = args.orderBy || { column: null, dir: 'asc' };
          args.orderBy.column = colSel.value || null;
          BuilderPane.updatePreview();
        });
        row.appendChild(colSel);

        const dirSel = el('select', { class: 'builder-select' });
        for (const d of ['asc', 'desc']) {
          const opt = el('option', { value: d, text: d });
          if (args.orderBy && args.orderBy.dir === d) opt.selected = true;
          dirSel.appendChild(opt);
        }
        dirSel.addEventListener('change', () => {
          args.orderBy = args.orderBy || { column: null, dir: 'asc' };
          args.orderBy.dir = dirSel.value;
          BuilderPane.updatePreview();
        });
        row.appendChild(dirSel);

        const limInput = el('input', {
          class: 'builder-input',
          type: 'number',
          min: '1',
          max: '10000',
          value: args.limit != null ? String(args.limit) : '',
          placeholder: 'limit',
        });
        limInput.addEventListener('input', () => {
          const n = parseInt(limInput.value, 10);
          args.limit = Number.isFinite(n) && n > 0 ? n : null;
          BuilderPane.updatePreview();
          BuilderPane.updateRunButton();
        });
        row.appendChild(limInput);
        section.appendChild(row);
        return section;
      },

      renderSelectOmit(args, tableMeta) {
        const section = el('div', { class: 'builder-section' });
        section.appendChild(
          el('div', { class: 'builder-section-title' }, [el('h3', { text: 'select / omit' })])
        );
        const chipsSel = el('div', { class: 'chip-row' });
        chipsSel.appendChild(
          el(
            'span',
            { style: { fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--text-muted)', marginRight: '4px' } },
            ['select:']
          )
        );
        for (const c of tableMeta.columns) {
          const active = args.select.includes(c.name);
          chipsSel.appendChild(
            el('button', {
              class: 'chip' + (active ? ' active' : ''),
              text: c.name,
              onclick: () => {
                if (active) args.select = args.select.filter((x) => x !== c.name);
                else {
                  args.select.push(c.name);
                  args.omit = args.omit.filter((x) => x !== c.name);
                }
                BuilderPane.render();
              },
            })
          );
        }
        section.appendChild(chipsSel);

        const chipsOm = el('div', { class: 'chip-row', style: { marginTop: '8px' } });
        chipsOm.appendChild(
          el(
            'span',
            { style: { fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--text-muted)', marginRight: '4px' } },
            ['omit:']
          )
        );
        for (const c of tableMeta.columns) {
          const active = args.omit.includes(c.name);
          chipsOm.appendChild(
            el('button', {
              class: 'chip' + (active ? ' active' : ''),
              text: c.name,
              onclick: () => {
                if (active) args.omit = args.omit.filter((x) => x !== c.name);
                else {
                  args.omit.push(c.name);
                  args.select = args.select.filter((x) => x !== c.name);
                }
                BuilderPane.render();
              },
            })
          );
        }
        section.appendChild(chipsOm);
        return section;
      },

      // ---------- Spec assembly / validation ----------
      buildFindManyArgs(localArgs, tableMeta) {
        const out = {};
        const whereObj = BuilderPane.assembleWhere(localArgs, tableMeta);
        if (whereObj) out.where = whereObj;
        if (localArgs.with && localArgs.with.length) {
          out.with = {};
          for (const w of localArgs.with) {
            const rel = (tableMeta.relations || []).find((r) => r.name === w.relation);
            if (!rel) continue;
            const childMeta = BuilderPane.findTable(rel.to);
            const childArgs = childMeta ? BuilderPane.buildFindManyArgs(w.args, childMeta) : null;
            if (childArgs && Object.keys(childArgs).length) {
              out.with[w.relation] = childArgs;
            } else {
              out.with[w.relation] = true;
            }
          }
        }
        if (localArgs.orderBy && localArgs.orderBy.column) {
          out.orderBy = { [localArgs.orderBy.column]: localArgs.orderBy.dir };
        }
        if (localArgs.limit) out.limit = localArgs.limit;
        if (localArgs.select && localArgs.select.length) {
          out.select = Object.fromEntries(localArgs.select.map((c) => [c, true]));
        }
        if (localArgs.omit && localArgs.omit.length) {
          out.omit = Object.fromEntries(localArgs.omit.map((c) => [c, true]));
        }
        return out;
      },

      assembleWhere(localArgs, tableMeta) {
        if (!localArgs.where || !localArgs.where.length) return null;
        const clauses = [];
        for (const c of localArgs.where) {
          const col = tableMeta.columns.find((cc) => cc.name === c.column);
          if (!col) continue;
          const parsed = BuilderPane.coerceValue(c.value, col.tsType, c.op);
          if (parsed === undefined) continue;
          const inner =
            c.op === 'equals'
              ? parsed
              : c.insensitive
              ? { [c.op]: parsed, mode: 'insensitive' }
              : { [c.op]: parsed };
          clauses.push({ [c.column]: inner });
        }
        if (!clauses.length) return null;
        if (clauses.length === 1 && localArgs.combinator === 'AND') return clauses[0];
        if (localArgs.combinator === 'AND') return Object.assign({}, ...clauses);
        if (localArgs.combinator === 'OR') return { OR: clauses };
        if (localArgs.combinator === 'NOT') return { NOT: clauses.length === 1 ? clauses[0] : { AND: clauses } };
        return null;
      },

      coerceValue(val, tsType, op) {
        if (val == null || val === '') return undefined;
        if (op === 'in' || op === 'notIn') {
          return String(val)
            .split(',')
            .map((s) => s.trim())
            .filter(Boolean)
            .map((s) => (isNumericType(tsType) ? Number(s) : s));
        }
        if (isNumericType(tsType)) {
          const n = Number(val);
          return Number.isFinite(n) ? n : undefined;
        }
        if (isBoolType(tsType)) {
          return val === 'true' || val === true;
        }
        return String(val);
      },

      validate() {
        const errs = {};
        if (!State.builder.table) errs.table = 'Pick a table';
        if (State.builder.args.limit != null && State.builder.args.limit < 1) {
          errs.limit = 'Limit must be ≥ 1';
        }
        for (const c of State.builder.args.where) {
          if (!c.column) errs.where = 'Clause missing column';
          if (c.value === '' || c.value == null) errs.where = 'Clause missing value';
        }
        State.builder.validation = errs;
        return Object.keys(errs).length === 0;
      },

      updateRunButton() {
        const ok = BuilderPane.validate();
        $('#builderRun').disabled = !ok;
      },

      updatePreview() {
        const tableMeta = BuilderPane.findTable(State.builder.table);
        if (!tableMeta) {
          $('#builderPreview').textContent = '';
          return;
        }
        const args = BuilderPane.buildFindManyArgs(State.builder.args, tableMeta);
        const code = BuilderPane.renderCode(State.builder.table, args);
        $('#builderPreview').innerHTML = highlightTs(code);
      },

      renderCode(tableName, args) {
        const ind = '  ';
        let out = 'await client.' + tableName + '.findMany(';
        const body = renderJsArgs(args, 1);
        if (!body) {
          out += ');';
        } else {
          out += '{\n' + body + '\n});';
        }
        return out;
      },

      async run() {
        if (!BuilderPane.validate()) return;
        const tableMeta = BuilderPane.findTable(State.builder.table);
        const args = BuilderPane.buildFindManyArgs(State.builder.args, tableMeta);
        State.builder.running = true;
        State.builder.error = null;
        BuilderPane.renderResults();
        try {
          const res = await Api.runBuilder(State.builder.table, args);
          State.builder.result = res;
          State.builder.error = null;
        } catch (err) {
          State.builder.error = err.message;
          State.builder.result = null;
        } finally {
          State.builder.running = false;
          BuilderPane.renderResults();
        }
      },

      renderResults() {
        const host = $('#builderResults');
        const header = $('#builderResultsHeader');
        if (State.builder.running) {
          header.textContent = 'Results · running…';
          host.innerHTML = '';
          const skel = el('div');
          for (let i = 0; i < 6; i++) {
            const row = el('div', { class: 'skeleton-row' });
            for (let c = 0; c < 4; c++) row.appendChild(el('div', { class: 'skeleton-cell' }));
            skel.appendChild(row);
          }
          host.appendChild(skel);
          return;
        }
        if (State.builder.error) {
          header.textContent = 'Results · error';
          host.innerHTML = '';
          host.appendChild(
            el('div', { class: 'error-box' }, [
              el('div', { class: 'error-box-title', text: 'Builder error' }),
              document.createTextNode(State.builder.error),
            ])
          );
          return;
        }
        const r = State.builder.result;
        if (!r) {
          header.textContent = 'Results';
          host.innerHTML = '<div class="empty">Run to see results.</div>';
          return;
        }
        header.textContent = 'Results · ' + formatNumber(r.rowCount) + ' rows · ' + r.elapsedMs + 'ms';
        host.innerHTML = '';
        if (!r.rows || !r.rows.length) {
          host.appendChild(el('div', { class: 'empty', text: 'No rows.' }));
          return;
        }
        const cols = (r.columns || []).map((c) => c.name || c);
        const rendered = cols.length ? cols : Object.keys(r.rows[0] || {});
        host.appendChild(Table.render(rendered, r.rows));
      },

      openSave() {
        if (!BuilderPane.validate()) return;
        const tableMeta = BuilderPane.findTable(State.builder.table);
        const args = BuilderPane.buildFindManyArgs(State.builder.args, tableMeta);
        State.savePrompt = { kind: 'builder', sql: null, args, fixedTable: State.builder.table };
        Modal.open('savePromptBackdrop');
        $('#savePromptName').value = '';
        SavePrompt.fillTables(State.builder.table);
      },

      bind() {
        $('#builderRun').addEventListener('click', () => BuilderPane.run());
        $('#builderSave').addEventListener('click', () => BuilderPane.openSave());
        $('#builderReset').addEventListener('click', () => {
          if (State.builder.table) BuilderPane.resetForTable(State.builder.table);
        });
      },
    };

    // ---------- JS args renderer (used by builder preview) ----------
    function renderJsArgs(obj, depth) {
      if (obj == null) return '';
      const ind = '  '.repeat(depth);
      const indIn = '  '.repeat(depth + 1);
      const keys = Object.keys(obj);
      if (!keys.length) return '';
      const lines = [];
      for (const k of keys) {
        const v = obj[k];
        lines.push(ind + k + ': ' + renderJsValue(v, depth) + ',');
      }
      return lines.join('\n');
    }
    function renderJsValue(v, depth) {
      if (v === null) return 'null';
      if (v === undefined) return 'undefined';
      if (typeof v === 'boolean') return v ? 'true' : 'false';
      if (typeof v === 'number') return String(v);
      if (typeof v === 'string') return "'" + v.replace(/\\/g, '\\\\').replace(/'/g, "\\'") + "'";
      if (Array.isArray(v)) {
        if (!v.length) return '[]';
        return '[' + v.map((x) => renderJsValue(x, depth)).join(', ') + ']';
      }
      if (typeof v === 'object') {
        const keys = Object.keys(v);
        if (!keys.length) return '{}';
        const ind = '  '.repeat(depth + 1);
        const close = '  '.repeat(depth);
        const inner = keys.map((k) => ind + k + ': ' + renderJsValue(v[k], depth + 1)).join(',\n');
        return '{\n' + inner + '\n' + close + '}';
      }
      return String(v);
    }

    // ---------- TS syntax highlighter (simple tokenizer) ----------
    function highlightTs(src) {
      const KWS = new Set([
        'await',
        'async',
        'const',
        'let',
        'var',
        'return',
        'if',
        'else',
        'true',
        'false',
        'null',
        'undefined',
        'import',
        'from',
        'export',
        'new',
      ]);
      const out = [];
      let i = 0;
      while (i < src.length) {
        const ch = src[i];
        // comment
        if (ch === '/' && src[i + 1] === '/') {
          let j = i;
          while (j < src.length && src[j] !== '\n') j++;
          out.push('<span class="tok-comment">' + escapeHtml(src.slice(i, j)) + '</span>');
          i = j;
          continue;
        }
        // string
        if (ch === "'" || ch === '"' || ch === '`') {
          const q = ch;
          let j = i + 1;
          while (j < src.length && src[j] !== q) {
            if (src[j] === '\\') j += 2;
            else j++;
          }
          j = Math.min(src.length, j + 1);
          out.push('<span class="tok-str">' + escapeHtml(src.slice(i, j)) + '</span>');
          i = j;
          continue;
        }
        // number
        if (/[0-9]/.test(ch)) {
          let j = i;
          while (j < src.length && /[0-9_.]/.test(src[j])) j++;
          out.push('<span class="tok-num">' + escapeHtml(src.slice(i, j)) + '</span>');
          i = j;
          continue;
        }
        // identifier / keyword
        if (/[A-Za-z_$]/.test(ch)) {
          let j = i;
          while (j < src.length && /[A-Za-z0-9_$]/.test(src[j])) j++;
          const word = src.slice(i, j);
          // key: identifier followed by colon
          let k = j;
          while (k < src.length && src[k] === ' ') k++;
          if (src[k] === ':') {
            out.push('<span class="tok-key">' + escapeHtml(word) + '</span>');
          } else if (KWS.has(word)) {
            out.push('<span class="tok-kw">' + escapeHtml(word) + '</span>');
          } else if (src[j] === '(' || (src[j] === '.' && false)) {
            out.push('<span class="tok-fn">' + escapeHtml(word) + '</span>');
          } else {
            out.push(escapeHtml(word));
          }
          i = j;
          continue;
        }
        // punctuation
        if (/[{}[\](),;:]/.test(ch)) {
          out.push('<span class="tok-punc">' + escapeHtml(ch) + '</span>');
          i++;
          continue;
        }
        out.push(escapeHtml(ch));
        i++;
      }
      return out.join('');
    }

    // =====================================================================
    // Saved queries
    // =====================================================================
    const SavedQueries = {
      async load(q) {
        if (q.kind === 'sql') {
          Router.selectTab('sql');
          $('#sqlEditor').value = q.sql || '';
          State.sql.text = q.sql || '';
          Storage.set('sqlDraft', q.sql || '');
          toast('Loaded saved SQL: ' + q.name, 'ok');
        } else if (q.kind === 'builder') {
          if (q.table) {
            const t = State.tablesByName.get(q.table);
            if (t) {
              State.currentTable = t;
              Storage.set('currentTable', t.name);
            }
          }
          Router.selectTab('builder');
          // Re-hydrating from a saved args object is tricky since our internal
          // shape differs from the flat Turbine args object. For now we store
          // the args alongside the builder table and render a hint.
          State.builder.table = q.table;
          State.builder.args = SavedQueries.hydrateBuilderArgs(q.args || {}, q.table);
          BuilderPane.render();
          toast('Loaded saved builder: ' + q.name, 'ok');
        }
      },

      hydrateBuilderArgs(argsObj, tableName) {
        // Best-effort inverse of buildFindManyArgs for a flat where obj
        const tableMeta = State.tablesByName.get(tableName);
        const out = emptyBuilderArgs();
        if (!tableMeta) return out;
        if (argsObj.limit) out.limit = argsObj.limit;
        if (argsObj.orderBy) {
          const k = Object.keys(argsObj.orderBy)[0];
          if (k) out.orderBy = { column: k, dir: argsObj.orderBy[k] };
        }
        if (argsObj.where) {
          const w = argsObj.where;
          const collectInto = (obj, combinator) => {
            for (const [col, val] of Object.entries(obj)) {
              if (col === 'AND' || col === 'OR' || col === 'NOT') continue;
              if (val && typeof val === 'object' && !Array.isArray(val)) {
                const op = Object.keys(val).find((k) => k !== 'mode') || 'equals';
                out.where.push({
                  column: col,
                  op,
                  value: val[op],
                  insensitive: val.mode === 'insensitive',
                });
              } else {
                out.where.push({ column: col, op: 'equals', value: val, insensitive: false });
              }
            }
          };
          if (w.OR) {
            out.combinator = 'OR';
            for (const c of w.OR) collectInto(c, 'OR');
          } else if (w.AND) {
            for (const c of w.AND) collectInto(c, 'AND');
          } else {
            collectInto(w, 'AND');
          }
        }
        if (argsObj.select) out.select = Object.keys(argsObj.select);
        if (argsObj.omit) out.omit = Object.keys(argsObj.omit);
        if (argsObj.with) {
          for (const [relName, v] of Object.entries(argsObj.with)) {
            const rel = (tableMeta.relations || []).find((r) => r.name === relName);
            if (!rel) continue;
            const childArgs = v === true ? emptyBuilderArgs() : SavedQueries.hydrateBuilderArgs(v, rel.to);
            out.with.push({ relation: relName, expanded: true, args: childArgs });
          }
        }
        return out;
      },

      async remove(id) {
        try {
          await Api.deleteSaved(id);
          State.savedQueries = State.savedQueries.filter((q) => q.id !== id);
          Sidebar.renderSaved();
          toast('Deleted saved query', 'ok');
        } catch (err) {
          toast('Delete failed: ' + err.message, 'err');
        }
      },

      async refresh() {
        try {
          const res = await Api.savedQueries();
          State.savedQueries = res.queries || [];
          Sidebar.renderSaved();
        } catch {
          // silent on refresh fail
        }
      },
    };

    // =====================================================================
    // Modals
    // =====================================================================
    const Modal = {
      open(id) {
        const m = document.getElementById(id);
        if (!m) return;
        m.classList.add('open');
        m.setAttribute('aria-hidden', 'false');
        setTimeout(() => {
          const inp = m.querySelector('input,textarea,select,button');
          if (inp) inp.focus();
        }, 20);
      },
      close(id) {
        const m = document.getElementById(id);
        if (!m) return;
        m.classList.remove('open');
        m.setAttribute('aria-hidden', 'true');
      },
      bind() {
        $$('[data-close-modal]').forEach((b) => {
          b.addEventListener('click', () => Modal.close(b.dataset.closeModal));
        });
        $$('.modal-backdrop').forEach((bd) => {
          bd.addEventListener('click', (e) => {
            if (e.target === bd) Modal.close(bd.id);
          });
        });
      },
    };

    const JsonModal = {
      open(val) {
        const host = $('#jsonModalBody');
        host.textContent = JSON.stringify(val, null, 2);
        Modal.open('jsonModalBackdrop');
      },
    };

    const SavePrompt = {
      fillTables(preferred) {
        const sel = $('#savePromptTable');
        sel.innerHTML = '';
        for (const t of State.tables) {
          const opt = el('option', { value: t.name, text: t.name });
          sel.appendChild(opt);
        }
        const target =
          preferred ||
          (State.currentTable && State.currentTable.name) ||
          (State.tables[0] && State.tables[0].name);
        if (target) sel.value = target;
      },
      bind() {
        $('#savePromptConfirm').addEventListener('click', async () => {
          const name = $('#savePromptName').value.trim();
          const table = $('#savePromptTable').value;
          if (!name || !table) {
            toast('Name and table required', 'err');
            return;
          }
          const payload = {
            table,
            name,
            kind: State.savePrompt.kind,
          };
          if (State.savePrompt.kind === 'sql') payload.sql = State.savePrompt.sql;
          if (State.savePrompt.kind === 'builder') payload.args = State.savePrompt.args;
          try {
            await Api.saveQuery(payload);
            Modal.close('savePromptBackdrop');
            toast('Query saved', 'ok');
            SavedQueries.refresh();
          } catch (err) {
            toast('Save failed: ' + err.message, 'err');
          }
        });
      },
    };

    // =====================================================================
    // Command palette
    // =====================================================================
    const Palette = {
      bind() {
        $('#openPalette').addEventListener('click', () => Palette.open());
        const input = $('#paletteInput');
        input.addEventListener('input', () => Palette.render());
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            Modal.close('paletteBackdrop');
            return;
          }
          if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
            e.preventDefault();
            const items = $$('.palette-item');
            if (!items.length) return;
            const cur = items.findIndex((n) => n.classList.contains('selected'));
            const next =
              e.key === 'ArrowDown'
                ? Math.min(items.length - 1, cur + 1)
                : Math.max(0, cur - 1);
            items.forEach((n, idx) => n.classList.toggle('selected', idx === next));
            items[next].scrollIntoView({ block: 'nearest' });
          }
          if (e.key === 'Enter') {
            const sel = $('.palette-item.selected');
            if (sel) sel.click();
          }
        });
      },

      open() {
        Modal.open('paletteBackdrop');
        $('#paletteInput').value = '';
        Palette.render();
      },

      render() {
        const q = $('#paletteInput').value.toLowerCase().trim();
        const list = $('#paletteList');
        list.innerHTML = '';

        const items = [];

        // Commands
        const cmds = [
          { name: 'Go to Data tab', kbd: ['G', 'D'], run: () => Router.selectTab('data') },
          { name: 'Go to Schema tab', kbd: ['G', 'S'], run: () => Router.selectTab('schema') },
          { name: 'Go to SQL tab', kbd: ['G', 'Q'], run: () => Router.selectTab('sql') },
          { name: 'Go to Builder tab', kbd: ['G', 'B'], run: () => Router.selectTab('builder') },
          { name: 'Run SQL query', kbd: [isMac() ? '⌘' : 'Ctrl', '↵'], run: () => { Router.selectTab('sql'); setTimeout(() => SqlPane.run(), 50); } },
          { name: 'Save SQL query', kbd: [isMac() ? '⌘' : 'Ctrl', 'S'], run: () => { Router.selectTab('sql'); SqlPane.openSave(); } },
          { name: 'Refresh data', kbd: ['R'], run: () => DataPane.loadAndRender() },
          { name: 'Reload schema', kbd: ['Shift', 'R'], run: () => boot(true) },
        ];
        const filteredCmds = q
          ? cmds.filter((c) => c.name.toLowerCase().includes(q))
          : cmds;
        if (filteredCmds.length) {
          list.appendChild(el('div', { class: 'palette-section', text: 'Commands' }));
          for (const c of filteredCmds) items.push(Palette.renderItem(c.name, c.kbd, c.run));
        }

        // Tables
        const tables = State.tables.filter(
          (t) => !q || t.name.toLowerCase().includes(q)
        );
        if (tables.length) {
          list.appendChild(el('div', { class: 'palette-section', text: 'Tables' }));
          for (const t of tables.slice(0, 50)) {
            items.push(
              Palette.renderItem(t.name, [formatCount(t.estimatedRows)], () => {
                Router.selectTable(t.name);
                Modal.close('paletteBackdrop');
              })
            );
          }
        }

        if (!items.length) {
          list.appendChild(el('div', { class: 'empty', style: { padding: '24px' }, text: 'No matches.' }));
        }
        for (const it of items) list.appendChild(it);
        const first = list.querySelector('.palette-item');
        if (first) first.classList.add('selected');
      },

      renderItem(name, kbd, run) {
        const kbdEls = (kbd || []).map((k) => el('span', { class: 'kbd', text: k }));
        const item = el('div', { class: 'palette-item' }, [
          el('div', { class: 'pi-name' }, [
            el(
              'svg',
              {
                class: 'pi-icon',
                viewBox: '0 0 24 24',
                fill: 'none',
                stroke: 'currentColor',
                'stroke-width': '2',
              },
              []
            ),
            el('span', { text: name }),
          ]),
          el('div', { class: 'pi-kbd' }, kbdEls),
        ]);
        item.addEventListener('click', () => {
          run();
          Modal.close('paletteBackdrop');
        });
        return item;
      },
    };

    // =====================================================================
    // Keyboard shortcuts
    // =====================================================================
    function bindKeys() {
      document.addEventListener('keydown', (e) => {
        const cmd = e.metaKey || e.ctrlKey;
        // Cmd+K opens palette
        if (cmd && (e.key === 'k' || e.key === 'K')) {
          e.preventDefault();
          Palette.open();
          return;
        }
        if (e.key === 'Escape') {
          ['savePromptBackdrop', 'jsonModalBackdrop', 'paletteBackdrop'].forEach((id) =>
            Modal.close(id)
          );
          return;
        }
        if (isTypingInInput()) return;
        if (e.key === '/') {
          e.preventDefault();
          $('#sidebarSearch').focus();
        }
        if (e.key === '?') {
          Palette.open();
        }
      });
    }

    // =====================================================================
    // Init / boot
    // =====================================================================
    async function boot(reloadOnly) {
      try {
        const schema = await Api.schema();
        State.schema = schema;
        State.tables = schema.tables || [];
        State.tablesByName = new Map(State.tables.map((t) => [t.name, t]));
        State.enums = schema.enums || {};
        State.connOk = true;
        $('#connDot').classList.add('ok');
        $('#connLabel').textContent = 'connected';
        const meta =
          (schema.schema || 'public') + ' · ' + State.tables.length + ' tables';
        $('#headerMeta').textContent = meta;
        $('#sidebarMeta').textContent = meta;

        // Restore
        const savedW = Storage.get('sidebarW');
        if (savedW) document.documentElement.style.setProperty('--sidebar-w', savedW);
        const savedTab = Storage.get('tab', 'data');
        const savedTable = Storage.get('currentTable');
        const initialTable = (savedTable && State.tablesByName.has(savedTable)
          ? savedTable
          : State.tables[0] && State.tables[0].name);
        if (initialTable) {
          State.currentTable = State.tablesByName.get(initialTable);
        }

        Sidebar.render();
        Router.selectTab(savedTab || 'data');
        if (State.currentTable) {
          if (savedTab === 'data' || !savedTab) DataPane.loadAndRender();
          if (savedTab === 'schema') SchemaPane.render();
          if (savedTab === 'builder') BuilderPane.resetForTable(State.currentTable.name);
        }

        // SQL draft
        const sqlDraft = Storage.get('sqlDraft', '');
        if (sqlDraft) $('#sqlEditor').value = sqlDraft;

        SavedQueries.refresh();
      } catch (err) {
        State.connOk = false;
        $('#connDot').classList.remove('ok');
        $('#connDot').classList.add('err');
        $('#connLabel').textContent = 'offline';
        $('#headerMeta').textContent = 'connection failed';
        $('#sidebarMeta').textContent = '—';
        const mainErr = el('div', { class: 'error-box' }, [
          el('div', { class: 'error-box-title', text: 'Cannot reach /api/schema' }),
          document.createTextNode(err.message),
        ]);
        $('#dataScroll').innerHTML = '';
        $('#dataScroll').appendChild(mainErr);
      }
    }

    function init() {
      Sidebar.bind();
      Router.bind();
      DataPane.bind();
      SqlPane.bind();
      BuilderPane.bind();
      Modal.bind();
      SavePrompt.bind();
      Palette.bind();
      bindKeys();
      boot();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
