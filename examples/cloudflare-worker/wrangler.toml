name = "turbine-cf-worker-example"
main = "index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Hyperdrive binding ŌĆö replace with your own Hyperdrive ID from
# `wrangler hyperdrive create`. The binding exposes
# `env.HYPERDRIVE.connectionString` which `pg.Pool` consumes directly.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "<your-hyperdrive-id>"
