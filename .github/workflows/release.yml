name: Release

# Publish turbine-orm to npm when a `v*` tag is pushed.
#
# Setup (one-time):
#   1. Generate an npm automation token (Settings → Access Tokens → Generate New → Automation)
#      https://docs.npmjs.com/creating-and-viewing-access-tokens
#   2. Add it to this repo as a secret named NPM_TOKEN
#      (Settings → Secrets and variables → Actions → New repository secret)
#
# Usage:
#   npm version patch   # or minor / major — bumps package.json and creates a git tag
#   git push --follow-tags
#
# The workflow runs lint → typecheck → unit tests → build, then two release
# gates that mirror ci.yml — a real Postgres integration run (seeded fixture)
# and the packed-tarball smoke test — before it verifies that package.json
# version matches the tag and publishes with `--provenance` so the npm registry
# can attest the build to this repo.
#
# A publish requires ALL of: test (lint/typecheck/unit/build/size),
# integration-postgres (real DB), and pack-smoke (published package surface).
# The full multi-version / multi-engine matrix still lives in ci.yml on push;
# the release gate runs one representative Postgres and the pack smoke so a tag
# can never publish SQL a real Postgres rejects or a broken package surface.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip npm publish)'
        type: boolean
        default: false

permissions:
  contents: write
  # Required for npm provenance attestation
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      # Bundle size gate — size-limit is the single source of truth (same check
      # CI runs). Measures the bundled import graph against .size-limit.js limits
      # (~31 kB main / ~22 kB edge, under 35/25 ceilings). Replaces the previous
      # stale hard-coded 150 kB tarball check that never matched reality.
      - name: Verify bundle sizes
        run: npx size-limit

  # Postgres integration gate — mirrors ci.yml's integration-tests but pinned to
  # a single representative major (16). Seeds src/test/fixtures/seed.sql, then
  # runs the full DB-backed suite so a tag can never publish SQL that a real
  # Postgres rejects. The 14/15/16/17 matrix stays in ci.yml on push.
  integration-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: turbine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Seed test database
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f src/test/fixtures/seed.sql
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/turbine_test
          PGPASSWORD: test
      - run: npm test
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/turbine_test

  # Packed-tarball smoke gate — mirrors ci.yml's pack-smoke. Installs the real
  # `npm pack` output into a clean temp project and verifies the published
  # package surface (ESM import, CJS require, CLI bin, and every subpath export)
  # so a tag can never publish a broken exports map or missing dist file.
  pack-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack tarball
        run: |
          TARBALL=$(npm pack --silent | tail -1)
          echo "TARBALL=$GITHUB_WORKSPACE/$TARBALL" >> "$GITHUB_ENV"
          echo "EXPECTED_VERSION=$(jq -r .version package.json)" >> "$GITHUB_ENV"
      - name: Verify packed manifest has no install scripts
        # The published tarball must not ship prepare/preinstall/install/postinstall.
        run: |
          MANIFEST=$(tar -xzOf "$TARBALL" package/package.json)
          BANNED=$(echo "$MANIFEST" | jq -r '
            (.scripts // {}) | keys[]
            | select(. == "prepare" or . == "preinstall" or . == "install" or . == "postinstall")
          ')
          if [ -n "$BANNED" ]; then
            echo "Published manifest must not contain install scripts, found:"
            echo "$BANNED"
            echo "$MANIFEST" | jq '.scripts'
            exit 1
          fi
          echo "Packed manifest has no install scripts OK"
      - name: Install tarball in temp project
        run: |
          SMOKE_DIR=$(mktemp -d)
          echo "SMOKE_DIR=$SMOKE_DIR" >> "$GITHUB_ENV"
          cd "$SMOKE_DIR"
          npm init -y > /dev/null
          npm install "$TARBALL" --no-audit --no-fund
      - name: Verify ESM import
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          node --input-type=module -e "const m = await import('turbine-orm'); if (!m.TurbineClient) { console.error('ESM import missing TurbineClient'); process.exit(1); } console.log('ESM import OK');"
      - name: Verify CJS require
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          node -e "const m = require('turbine-orm'); if (!m.TurbineClient) { console.error('CJS require missing TurbineClient'); process.exit(1); } console.log('CJS require OK');"
      - name: Verify CLI bin prints version
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          npx turbine --version
          npx turbine --version | grep -F "$EXPECTED_VERSION"
      - name: Verify serverless subpath import
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          node --input-type=module -e "const m = await import('turbine-orm/serverless'); if (typeof m.turbineHttp !== 'function') { console.error('serverless subpath missing turbineHttp'); process.exit(1); } console.log('serverless subpath OK');"
      - name: Verify sqlite subpath import
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          node --input-type=module -e "const m = await import('turbine-orm/sqlite'); if (m.sqliteDialect?.name !== 'sqlite' || typeof m.turbineSqlite !== 'function') { console.error('sqlite subpath broken'); process.exit(1); } console.log('sqlite subpath OK');"
      - name: Verify adapters subpath import
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          node --input-type=module -e "const m = await import('turbine-orm/adapters'); if (!m.cockroachdb || !m.yugabytedb || !m.postgresql) { console.error('adapters subpath broken'); process.exit(1); } console.log('adapters subpath OK', Object.keys(m).slice(0,8).join(','));"

  publish:
    needs: [test, integration-postgres, pack-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve version and ensure tag exists
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG" != "$PKG_VERSION" ]; then
              echo "::error::Tag v$TAG does not match package.json version $PKG_VERSION"
              exit 1
            fi
          else
            # workflow_dispatch — create tag if it doesn't exist
            if ! git rev-parse "v$PKG_VERSION" >/dev/null 2>&1; then
              git tag "v$PKG_VERSION"
              git push origin "v$PKG_VERSION"
              echo "Created and pushed tag v$PKG_VERSION"
            fi
          fi
          echo "Publishing turbine-orm@$PKG_VERSION"

      - name: Build
        run: npm run build

      # Backfilled/old tags must not re-attempt a publish: npm rejects
      # republishing an existing version, which would just paint the run red.
      - name: Check version not already published
        id: published
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          if npm view "turbine-orm@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "already=true >> note: turbine-orm@$PKG_VERSION already on npm — skipping publish"
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' && steps.published.outputs.already != 'true' }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Install the just-published version from the public registry in a clean
      # temp project and verify the package surface (ESM import, CJS require,
      # CLI bin, serverless subpath). Registry propagation can lag the publish,
      # so retry the install for up to ~2 minutes before failing.
      - name: Post-publish smoke test
        if: ${{ github.event.inputs.dry_run != 'true' && steps.published.outputs.already != 'true' }}
        env:
          # setup-node's .npmrc references NODE_AUTH_TOKEN; npm errors on any
          # command if it's undefined, so keep it set for this step too.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"
          npm init -y > /dev/null
          INSTALLED=0
          for i in $(seq 1 12); do
            if npm install "turbine-orm@$PKG_VERSION" --no-audit --no-fund; then
              INSTALLED=1
              break
            fi
            echo "turbine-orm@$PKG_VERSION not installable yet, retrying in 10s ($i/12)..."
            sleep 10
          done
          if [ "$INSTALLED" != "1" ]; then
            echo "::error::turbine-orm@$PKG_VERSION never became installable from the registry"
            exit 1
          fi
          node --input-type=module -e "const m = await import('turbine-orm'); if (!m.TurbineClient) { console.error('ESM import missing TurbineClient'); process.exit(1); } console.log('ESM import OK');"
          node -e "const m = require('turbine-orm'); if (!m.TurbineClient) { console.error('CJS require missing TurbineClient'); process.exit(1); } console.log('CJS require OK');"
          node --input-type=module -e "const m = await import('turbine-orm/serverless'); if (typeof m.turbineHttp !== 'function') { console.error('serverless subpath missing turbineHttp'); process.exit(1); } console.log('serverless subpath OK');"
          npx turbine --version
          npx turbine --version | grep -F "$PKG_VERSION"
          echo "Post-publish smoke test passed for turbine-orm@$PKG_VERSION"

      - name: Dry run — verify package
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: npm pack --dry-run
