name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

  # Integration tests run against a real Postgres service container. The
  # service is seeded from src/test/fixtures/seed.sql before the test run,
  # which provides the schema + a small fixture dataset (5 orgs / 8 users /
  # 10 posts / 20 comments) — enough to exercise nested relations, cursor
  # pagination, JSONB / array operators, and the streaming cursor API.
  # Failures gate PRs.
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: turbine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Seed test database
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f src/test/fixtures/seed.sql
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/turbine_test
          PGPASSWORD: test
      - run: npm test
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/turbine_test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify CJS output
        run: test -f dist/cjs/index.js && head -1 dist/cjs/index.js | grep -q '"use strict"'
      - name: Verify ESM output
        run: test -f dist/index.js
      - name: Check package size
        run: |
          PACK_OUTPUT=$(npm pack --dry-run 2>&1)
          SIZE_KB=$(printf '%s\n' "$PACK_OUTPUT" | node -e "const input = require('fs').readFileSync(0, 'utf8'); const match = input.match(/package size:\s*([0-9.]+)\s*(B|kB|MB)/i); if (!match) process.exit(1); let value = Number(match[1]); const unit = match[2].toLowerCase(); if (unit === 'b') value /= 1024; if (unit === 'mb') value *= 1024; console.log(value.toFixed(1));")
          echo "Package size: ${SIZE_KB}kB"
          node -e "const size = Number(process.argv[1]); const limit = 350; if (!Number.isFinite(size)) { console.error('::error::Could not parse package size'); process.exit(1); } if (size > limit) { console.error('::error::Package size ' + size + 'kB exceeds ' + limit + 'kB limit'); process.exit(1); }" "$SIZE_KB"
      - name: Check bundle sizes
        run: npx size-limit

  security:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  error-codes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check error code enforcement
        run: npx tsx scripts/check-error-codes.ts
