name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

  # Integration tests run against a real Postgres service container, exercised
  # across a version matrix (PG 14/15/16/17). The service is seeded from
  # src/test/fixtures/seed.sql before the test run, which provides the schema +
  # a small fixture dataset (7 orgs / 8 users / 10 posts / 20 comments) — enough
  # to exercise nested relations, cursor pagination, JSONB / array operators,
  # and the streaming cursor API. Running the full suite on every supported
  # major version catches version-specific SQL/behavior regressions (e.g. the
  # default statement_timeout path that was previously never integration-tested).
  # Failures gate PRs.
  integration-tests:
    name: integration-tests (postgres ${{ matrix.postgres-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres-version: [14, 15, 16, 17]
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: turbine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Seed test database
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f src/test/fixtures/seed.sql
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/turbine_test
          PGPASSWORD: test
      - run: npm test
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/turbine_test

  # Real CockroachDB job. The CRDB/Yugabyte adapters were only ever unit-tested
  # with mocked clients, so a bug in the adapter's statementTimeout set_config()
  # SQL (and the Studio read-only timeout path) shipped green. This job spins a
  # real single-node CockroachDB and runs the DB-gated timeout/adapter
  # integration tests against it, proving the SQL the adapter emits is actually
  # accepted by a real CockroachDB server. CRDB listens on 26257 and (in
  # --insecure mode) authenticates the built-in `root` user with no password.
  # This job GATES PRs — a CRDB-rejected statement is exactly the regression we
  # want to catch.
  # Real CockroachDB job: proves the cockroachdb adapter's set_config()
  # `transaction_timeout` SQL is accepted by a real CRDB server (not just a
  # mock). It runs studio-timeout-integration.test.ts with
  # TURBINE_TEST_ENGINE=cockroachdb so the CRDB-specific adapter SQL is the SQL
  # actually sent over the wire. Hard gate — engine integration regressions fail the PR.
  cockroachdb-integration:
    name: cockroachdb-integration
    runs-on: ubuntu-latest
    services:
      cockroachdb:
        # Pinned to the v24.1 major (rolling within the major) so an upstream
        # CRDB release can't silently change behavior under CI.
        image: cockroachdb/cockroach:latest-v24.1
        # The image's ENTRYPOINT is `cockroach`, so the service `command:` only
        # needs to supply the subcommand + flags. `start-single-node --insecure`
        # brings up a one-node cluster with auth disabled, suitable for CI. SQL
        # is served on 26257; the HTTP health endpoint on 8080.
        command: start-single-node --insecure
        # Health-probe with the cockroach binary itself (guaranteed present in
        # the image) rather than curl/pg_isready, which aren't. `node status`
        # exits 0 once the single node is live and serving SQL.
        options: >-
          --health-cmd "/cockroach/cockroach node status --insecure --host=localhost:26257"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 30s
        ports:
          - 26257:26257
          - 8080:8080
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Wait until SQL accepts connections, then create the test database.
      - name: Wait for CockroachDB SQL + create database
        run: |
          for i in $(seq 1 30); do
            if node -e "const pg=require('pg');const c=new pg.Client({connectionString:process.env.ROOT_URL});c.connect().then(()=>c.query('SELECT 1')).then(()=>c.end()).then(()=>process.exit(0)).catch(()=>process.exit(1))"; then
              echo "CockroachDB is accepting SQL connections"
              break
            fi
            echo "Waiting for CockroachDB SQL... ($i)"
            sleep 3
          done
          node -e "const pg=require('pg');const c=new pg.Client({connectionString:process.env.ROOT_URL});c.connect().then(()=>c.query('CREATE DATABASE IF NOT EXISTS turbine_test')).then(()=>c.end()).then(()=>process.exit(0)).catch(e=>{console.error(e);process.exit(1)})"
        env:
          ROOT_URL: postgres://root@localhost:26257/defaultdb?sslmode=disable
      - name: Run engine-aware studio-timeout integration test against CockroachDB
        # TURBINE_TEST_ENGINE=cockroachdb makes the test send the cockroachdb
        # adapter's own `transaction_timeout` set_config() SQL over the live
        # connection — the engine-specific path the mocked unit tests can't cover.
        run: npx tsx --test src/test/studio-timeout-integration.test.ts
        env:
          DATABASE_URL: postgres://root@localhost:26257/turbine_test?sslmode=disable
          TURBINE_TEST_ENGINE: cockroachdb

  # Real MySQL 8 job for the turbine-orm/mysql engine (Phase 2 — multi-dialect).
  # The mysql2 named-param driver + the `reselect` result strategy (no RETURNING)
  # and the information_schema introspector are only proven against a real server,
  # so this job spins a mysql:8 service container, sets MYSQL_URL, and runs
  # src/test/mysql.test.ts — whose integration suite creates its own schema, seeds
  # the fixture, dogfoods the introspector, and exercises findMany / nested-with /
  # create(reselect) / upsert / update / delete / transactions / typed errors.
  # Without MYSQL_URL (locally + the unit-tests job) those tests skip cleanly while
  # the build-only + mock-driver tests still run. mysql2 is a devDep, so `npm ci`
  # installs it. Hard gate — engine integration regressions fail the PR.
  mysql-integration:
    name: mysql-integration
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: turbine_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run turbine-orm/mysql integration tests against MySQL 8
        run: npx tsx --test src/test/mysql.test.ts
        env:
          MYSQL_URL: mysql://root:root@127.0.0.1:3306/turbine_test

  # Real SQL Server 2022 job for the turbine-orm/mssql engine (Phase 3 — multi-dialect).
  # The FOR JSON PATH nested-relation generator, the OUTPUT/MERGE result strategy, the
  # @pN named-param driver, and the INFORMATION_SCHEMA/sys introspector are only proven
  # against a real server, so this job spins an mssql/server:2022-latest service container,
  # sets MSSQL_URL, and runs src/test/mssql.test.ts — whose integration suite creates its
  # own schema, seeds the fixture, dogfoods the introspector, and exercises findMany /
  # nested-with / create(output) / upsert(MERGE) / update / delete / transactions / typed
  # errors. Without MSSQL_URL (locally + the unit-tests job) those tests skip cleanly while
  # the build-only + mock-driver tests still run. mssql is a devDep, so `npm ci` installs
  # it. Hard gate — engine integration regressions fail the PR.
  mssql-integration:
    name: mssql-integration
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Turbine_Passw0rd!"
          SA_PASSWORD: "Turbine_Passw0rd!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'Turbine_Passw0rd!' -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Turbine_Passw0rd!' -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Create the test database with the same `mssql` driver the tests use
      # (already installed by `npm ci`) rather than a separate sqlcmd tools
      # image — `mcr.microsoft.com/mssql-tools18:latest` has no published tag.
      - name: Create the test database
        # Write the script into the repo root (the step's cwd) so `require('mssql')`
        # resolves the package `npm ci` just installed — a /tmp script can't see
        # the workspace node_modules.
        run: |
          cat > create-mssql-db.cjs <<'EOF'
          const sql = require('mssql');
          (async () => {
            const pool = await sql.connect({
              server: '127.0.0.1', port: 1433, user: 'sa',
              password: 'Turbine_Passw0rd!', database: 'master',
              options: { encrypt: false, trustServerCertificate: true },
            });
            await pool.request().query("IF DB_ID('turbine_test') IS NULL CREATE DATABASE turbine_test");
            await pool.close();
            console.log('turbine_test database ready');
          })().catch((err) => { console.error(err); process.exit(1); });
          EOF
          node create-mssql-db.cjs
          rm -f create-mssql-db.cjs
      - name: Run turbine-orm/mssql integration tests against SQL Server 2022
        run: npx tsx --test src/test/mssql.test.ts
        env:
          MSSQL_URL: mssql://sa:Turbine_Passw0rd!@127.0.0.1:1433/turbine_test

  # Real PowDB job for the turbine-orm/powdb engine — runs the embedded napi
  # addon (@zvndev/powdb-embedded) IN-PROCESS, so there is NO service container
  # (unlike mysql/mssql/cockroachdb). The addon is a published npm package with a
  # Linux-glibc-x64 prebuilt binary, installed as a devDependency by `npm ci`, so
  # the runner loads the real engine and src/test/powdb.integration.test.ts
  # exercises RETURNING column-order, typed error mapping, the empty-where guard,
  # transactions (commit/rollback + nested/re-entrant throw), chunked relation
  # loads, and the E017 guards against a real database. On a platform without a
  # prebuilt binary the suite's skipGate fires and every test skips cleanly, so
  # `npm run test:unit` stays green without the addon. Hard gate — embedded PowDB integration must pass on every PR.
  powdb-integration:
    name: powdb-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run turbine-orm/powdb integration tests against the embedded engine
        run: npx tsx --test src/test/powdb.integration.test.ts

  # NOTE: the YugabyteDB integration job used to live here, but its container
  # never initialized successfully on GitHub runners and burned ~6 minutes of
  # guaranteed red X on every PR/push. It now runs on a nightly schedule in
  # nightly.yml (job: yugabytedb-integration) — same test, same
  # continue-on-error — so per-PR CI stays green and fast.

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify CJS output
        run: test -f dist/cjs/index.js && head -1 dist/cjs/index.js | grep -q '"use strict"'
      - name: Verify ESM output
        run: test -f dist/index.js
      # Bundle size is gated by size-limit alone — it measures the REAL bundled
      # import graph (esbuild) of each public entry against the limits declared
      # in .size-limit.js (~31 kB main / ~22 kB edge, under 35/25 limits). This
      # replaces the previous hard-coded `npm pack` KB ceiling (which was stale
      # at 350 kB and measured tarball size, not the runtime closure). One
      # source of truth, shared with `npm run size`.
      - name: Check bundle sizes
        run: npx size-limit

  # Installs the real npm tarball (npm pack) into a clean temp project and
  # verifies the published package surface end-to-end: ESM import, CJS require,
  # the `turbine` CLI bin, and the /serverless subpath export. Catches
  # packaging regressions (missing dist files, broken exports map, bad bin
  # path) that `npm run build` alone can't.
  pack-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack tarball
        run: |
          TARBALL=$(npm pack --silent | tail -1)
          echo "TARBALL=$GITHUB_WORKSPACE/$TARBALL" >> "$GITHUB_ENV"
          echo "EXPECTED_VERSION=$(jq -r .version package.json)" >> "$GITHUB_ENV"
      - name: Verify packed manifest has no install scripts
        # The published tarball must not ship prepare/preinstall/install/postinstall.
        # prepack strips the husky-installing `prepare` script; postpack restores it
        # locally. A leaked install script triggers allow-scripts warnings for
        # consumers and would run on git-dependency installs.
        run: |
          MANIFEST=$(tar -xzOf "$TARBALL" package/package.json)
          BANNED=$(echo "$MANIFEST" | jq -r '
            (.scripts // {}) | keys[]
            | select(. == "prepare" or . == "preinstall" or . == "install" or . == "postinstall")
          ')
          if [ -n "$BANNED" ]; then
            echo "Published manifest must not contain install scripts, found:"
            echo "$BANNED"
            echo "$MANIFEST" | jq '.scripts'
            exit 1
          fi
          echo "Packed manifest has no install scripts OK"
      - name: Install tarball in temp project
        run: |
          SMOKE_DIR=$(mktemp -d)
          echo "SMOKE_DIR=$SMOKE_DIR" >> "$GITHUB_ENV"
          cd "$SMOKE_DIR"
          npm init -y > /dev/null
          npm install "$TARBALL" --no-audit --no-fund
      - name: Verify ESM import
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          node --input-type=module -e "const m = await import('turbine-orm'); if (!m.TurbineClient) { console.error('ESM import missing TurbineClient'); process.exit(1); } console.log('ESM import OK');"
      - name: Verify CJS require
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          node -e "const m = require('turbine-orm'); if (!m.TurbineClient) { console.error('CJS require missing TurbineClient'); process.exit(1); } console.log('CJS require OK');"
      - name: Verify CLI bin prints version
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          npx turbine --version
          npx turbine --version | grep -F "$EXPECTED_VERSION"
      - name: Verify serverless subpath import
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          node --input-type=module -e "const m = await import('turbine-orm/serverless'); if (typeof m.turbineHttp !== 'function') { console.error('serverless subpath missing turbineHttp'); process.exit(1); } console.log('serverless subpath OK');"
      - name: Verify mysql subpath import (mysql2 NOT installed — must not crash)
        working-directory: ${{ env.SMOKE_DIR }}
        # mysql2 is an OPTIONAL peer; this temp project never installs it. Importing
        # turbine-orm/mysql and using mysqlDialect must work with mysql2 absent
        # (it is only loaded by the dynamic import inside turbineMysql()).
        run: |
          node --input-type=module -e "const m = await import('turbine-orm/mysql'); if (m.mysqlDialect?.name !== 'mysql' || typeof m.turbineMysql !== 'function') { console.error('mysql subpath broken'); process.exit(1); } console.log('mysql subpath OK (no mysql2 needed to import)');"
      - name: Verify mssql subpath import (mssql NOT installed — must not crash)
        working-directory: ${{ env.SMOKE_DIR }}
        # mssql is an OPTIONAL peer; this temp project never installs it. Importing
        # turbine-orm/mssql and using mssqlDialect must work with mssql absent
        # (it is only loaded by the dynamic import inside turbineMssql()).
        run: |
          node --input-type=module -e "const m = await import('turbine-orm/mssql'); if (m.mssqlDialect?.name !== 'mssql' || typeof m.turbineMssql !== 'function') { console.error('mssql subpath broken'); process.exit(1); } console.log('mssql subpath OK (no mssql needed to import)');"

      - name: Verify sqlite subpath import
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          node --input-type=module -e "const m = await import('turbine-orm/sqlite'); if (m.sqliteDialect?.name !== 'sqlite' || typeof m.turbineSqlite !== 'function') { console.error('sqlite subpath broken'); process.exit(1); } console.log('sqlite subpath OK');"
      - name: Verify powdb subpath import (peers NOT installed — must not crash)
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          node --input-type=module -e "const m = await import('turbine-orm/powdb'); if (typeof m.turbinePowDB !== 'function') { console.error('powdb subpath broken'); process.exit(1); } console.log('powdb subpath OK (no peer needed to import)');"
      - name: Verify adapters subpath import
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          node --input-type=module -e "const m = await import('turbine-orm/adapters'); if (!m.cockroachdb || !m.yugabytedb || !m.postgresql) { console.error('adapters subpath broken'); process.exit(1); } console.log('adapters subpath OK', Object.keys(m).slice(0,8).join(','));"

  # Simulates the real first-run a brand-new user gets from npm 11 defaults and
  # runs the documented quickstart end-to-end against a real Postgres. This is
  # the exact path that silently broke in the field and that unit tests could
  # not catch: a "type": "commonjs" project (npm init -y), a TypeScript
  # turbine.config.ts + schema.ts loaded through tsx, DATABASE_URL supplied ONLY
  # via a .env file, and turbine() called with NO arguments in the user's
  # script. The scratch project installs the packed tarball, then runs
  # init -> push -> generate -> query and asserts real rows round-trip. The core
  # steps live in scripts/quickstart-smoke.sh so a developer can run the same
  # thing locally. Gates PRs.
  quickstart-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: turbine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack tarball
        run: echo "TARBALL=$GITHUB_WORKSPACE/$(npm pack --silent | tail -1)" >> "$GITHUB_ENV"
      - name: Run quickstart smoke (real Postgres, .env + no-arg turbine())
        run: bash scripts/quickstart-smoke.sh
        env:
          TARBALL: ${{ env.TARBALL }}
          DATABASE_URL: postgres://test:test@localhost:5432/turbine_test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Hard gate: any HIGH or CRITICAL vulnerability in the PRODUCTION
      # dependency tree fails CI. (The prod tree is `pg` + `@types/pg`;
      # currently 0 vulns, so this passes — and stays meaningful.)
      - name: Audit production dependencies (blocking)
        run: npm audit --omit=dev --audit-level=high
      # Full-tree audit (dev deps included) for visibility only — never blocks.
      - name: Audit full tree including dev deps (non-blocking)
        run: npm audit --audit-level=high
        continue-on-error: true

  error-codes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check error code enforcement
        run: npx tsx scripts/check-error-codes.ts
