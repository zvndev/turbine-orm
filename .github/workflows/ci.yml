name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

  # Integration tests run against a real Postgres service container. The
  # service is seeded from src/test/fixtures/seed.sql before the test run,
  # which provides the schema + a small fixture dataset (5 orgs / 8 users /
  # 10 posts / 20 comments) — enough to exercise nested relations, cursor
  # pagination, JSONB / array operators, and the streaming cursor API.
  # Failures gate PRs.
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: turbine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Seed test database
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f src/test/fixtures/seed.sql
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/turbine_test
          PGPASSWORD: test
      - run: npm test
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/turbine_test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify CJS output
        run: test -f dist/cjs/index.js && head -1 dist/cjs/index.js | grep -q '"use strict"'
      - name: Verify ESM output
        run: test -f dist/index.js
      - name: Check package size
        run: |
          SIZE=$(npm pack --dry-run 2>&1 | grep 'package size' | awk '{print $NF}')
          echo "Package size: $SIZE"
          # Fail if package exceeds 150kB
          SIZE_KB=$(npm pack --dry-run 2>&1 | grep 'package size' | awk '{print $(NF-1)}')
          if [ "$(echo "$SIZE_KB > 150" | bc)" -eq 1 ]; then
            echo "::error::Package size $SIZE exceeds 150kB limit"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
