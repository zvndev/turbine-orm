name: Publish @next

on:
  push:
    branches: [main]

# Only one publish at a time per branch
concurrency:
  group: publish-next-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-next:
    runs-on: ubuntu-latest
    # Don't publish on tag pushes (release.yml handles those)
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Set prerelease version
        run: |
          # Use short SHA for unique prerelease identifier
          SHORT_SHA=$(git rev-parse --short HEAD)
          CURRENT=$(jq -r .version package.json)
          NEXT_VERSION="${CURRENT}-next.${SHORT_SHA}"
          npm version "$NEXT_VERSION" --no-git-tag-version
          echo "Publishing turbine-orm@${NEXT_VERSION} as @next"

      - name: Publish to npm with @next tag
        run: npm publish --tag next --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
